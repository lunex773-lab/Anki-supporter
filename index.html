<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F2F2F7" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
<title>学習暗記カード</title>
<style>
:root{
 --bg:#F2F2F7; --card:#FFFFFF; --card2:#FFFFFF;
 --label:#1C1C1E; --label2:#8A8A8E; --label3:#B0B0B5;
 --sep:rgba(60,60,67,.13);
 --fill:#E9E9EF; --fill-press:#DBDBE3; --track:#C7C7CC;
 --ac:#3A56E8; --ac-press:#2C43C6; --ac-soft:rgba(58,86,232,.12);
 --grn:#34C759; --grn-press:#28A946;
 --red:#FF3B30; --red-press:#DC2C22;
 --nav:rgba(242,242,247,.78);
 --shadow:0 1px 2px rgba(0,0,0,.05),0 8px 24px rgba(0,0,0,.05);
 --radius:16px;
 --spring:cubic-bezier(.34,1.42,.5,1);
 --ease:cubic-bezier(.16,1,.3,1);
 --ease-io:cubic-bezier(.4,0,.2,1);
}
@media (prefers-color-scheme: dark){
 :root{
  --bg:#000000; --card:#1C1C1E; --card2:#2C2C2E;
  --label:#FFFFFF; --label2:#98989F; --label3:#6C6C70;
  --sep:rgba(84,84,88,.55);
  --fill:#2C2C2E; --fill-press:#3A3A3C; --track:#48484A;
  --ac:#5E7BFF; --ac-press:#465EE0; --ac-soft:rgba(94,123,255,.18);
  --grn:#30D158; --grn-press:#28B94C;
  --red:#FF453A; --red-press:#E03A30;
  --nav:rgba(18,18,20,.78);
  --shadow:0 1px 2px rgba(0,0,0,.5),0 8px 24px rgba(0,0,0,.4);
 }
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
html,body{margin:0;padding:0}
body{
 background:var(--bg);color:var(--label);
 font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP",system-ui,sans-serif;
 font-size:17px;line-height:1.5;letter-spacing:-.01em;
 -webkit-font-smoothing:antialiased;
 padding-bottom:calc(64px + env(safe-area-inset-bottom));
}
h1,h2,h3{margin:0;font-weight:700;letter-spacing:-.02em}

/* ===== nav header (large title, translucent) ===== */
.nav{
 position:sticky;top:0;z-index:20;
 padding:calc(6px + env(safe-area-inset-top)) 20px 8px;
 background:var(--nav);
 -webkit-backdrop-filter:saturate(180%) blur(20px);
 backdrop-filter:saturate(180%) blur(20px);
 border-bottom:.5px solid var(--sep);
}
.nav-title{font-size:30px;font-weight:800;letter-spacing:-.03em;line-height:1.15}

main{max-width:600px;margin:0 auto;padding:8px 16px 32px}
.screen{animation:screenIn .36s var(--ease) both}

/* ===== grouped card ===== */
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin:10px 0 18px}
.section-title{font-size:13px;font-weight:600;color:var(--label2);letter-spacing:.02em;margin:22px 4px 6px;text-transform:none}

/* ===== buttons ===== */
.btn{
 display:block;width:100%;padding:14px;border:none;border-radius:14px;
 background:var(--fill);color:var(--label);font-size:17px;font-weight:600;
 text-align:center;cursor:pointer;font-family:inherit;letter-spacing:-.01em;
 transition:transform .16s var(--spring),background .18s,opacity .18s;
}
.btn:active{transform:scale(.965);background:var(--fill-press)}
.btn.primary,.btn.ai{background:var(--ac);color:var(--on-ac,#fff)}
.btn.primary:active,.btn.ai:active{background:var(--ac-press)}
.btn.red{background:var(--red);color:#fff}
.btn.red:active{background:var(--red-press)}
.btn.big{padding:16px;font-size:18px;font-weight:700;border-radius:16px}
.btn.small{width:auto;display:inline-block;padding:9px 16px;font-size:15px;border-radius:11px}
.btn.plain{background:transparent;color:var(--ac);font-weight:600}
.btn.plain:active{background:var(--ac-soft)}
.btn.danger{color:var(--red);background:var(--fill)}
.btn.grade-ok{background:var(--grn);color:#fff}
.btn.grade-ok:active{background:var(--grn-press)}
.btn.grade-ng{background:var(--red);color:#fff}
.btn.grade-ng:active{background:var(--red-press)}
.btn:disabled{opacity:.4;pointer-events:none}
.row{display:flex;gap:11px}
.row>.btn{flex:1}

/* ===== segmented chips ===== */
.chips{display:flex;gap:8px;flex-wrap:wrap;margin:2px 0 12px}
.chip{
 padding:9px 15px;border:none;border-radius:999px;background:var(--fill);
 font-size:15px;font-weight:600;color:var(--label);cursor:pointer;font-family:inherit;letter-spacing:-.01em;
 transition:transform .16s var(--spring),background .18s,color .18s;
}
.chip:active{transform:scale(.94)}
.chip.on{background:var(--ac);color:var(--on-ac,#fff)}

/* ===== fields ===== */
input[type=text],input[type=url],textarea{
 width:100%;padding:13px 14px;border:none;border-radius:12px;background:var(--fill);
 font-size:16px;color:var(--label);font-family:inherit;letter-spacing:-.01em;
 transition:box-shadow .18s;
}
input[type=text]:focus,input[type=url]:focus,textarea:focus{outline:none;box-shadow:0 0 0 3px var(--ac-soft)}
textarea{resize:vertical;min-height:80px;line-height:1.55}
label.f{display:block;font-size:13px;font-weight:600;color:var(--label2);margin:14px 0 5px;padding-left:2px}
.muted{color:var(--label2);font-size:14px}
.danger{color:var(--red)}
.badge{display:inline-block;padding:2px 9px;border-radius:8px;background:var(--fill);color:var(--label2);font-size:12px;font-weight:600}
.badge.dup{color:var(--red);background:transparent;box-shadow:inset 0 0 0 1.2px var(--red)}
.subj{display:inline-block;min-width:24px;text-align:center;padding:3px 8px;border-radius:7px;font-size:12px;font-weight:800;color:#fff}

/* ===== iOS note ===== */
.tip{background:var(--ac-soft);border-radius:12px;padding:12px 14px;font-size:14px;display:flex;gap:8px;align-items:center;margin-bottom:14px;color:var(--label)}
.tip button{margin-left:auto;background:none;border:none;font-weight:600;font-size:20px;cursor:pointer;color:var(--label2);line-height:1}

/* ===== thumbnails ===== */
.thumbs{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.thumbwrap{position:relative;animation:popIn .3s var(--spring) both}
.thumb{width:68px;height:68px;border-radius:12px;object-fit:cover;display:block;box-shadow:var(--shadow)}
.thumbwrap .x{position:absolute;top:-7px;right:-7px;width:24px;height:24px;border-radius:999px;background:var(--label);color:var(--card);border:2px solid var(--card);font-size:13px;font-weight:700;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* ===== flashcard (signature) ===== */
.sess{}
.sess-top{display:flex;justify-content:space-between;align-items:center;margin:4px 2px 10px}
.flip{perspective:1600px;height:360px;margin-bottom:0;animation:cardIn .34s var(--ease) both}
.flip-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .58s cubic-bezier(.3,1.3,.4,1)}
.sess.flipped .flip-inner{transform:rotateY(180deg)}
.face{
 position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
 background:var(--card);border-radius:22px;box-shadow:var(--shadow);
 padding:22px;display:flex;flex-direction:column;overflow:hidden;
}
.face.back{transform:rotateY(180deg)}
.face .term{font-size:28px;font-weight:800;margin:auto 0;text-align:center;line-height:1.35;letter-spacing:-.02em}
.face .mk{padding:0 1px}
.face .def{font-size:17px;overflow-y:auto;margin:auto 0;line-height:1.7;-webkit-overflow-scrolling:touch}
.face .meta{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--label2);gap:8px}
.face .meta>span:first-child{font-weight:600;color:var(--label)}
.face .hint{text-align:center;font-size:13px;color:var(--label3);font-weight:500}
.face.back .hint{color:var(--ac);font-weight:600}

.ctrl-wrap{position:relative;height:58px;margin-top:16px}
.ctrl{position:absolute;inset:0;transition:opacity .26s var(--ease),transform .26s var(--ease)}
.ctrl-back{opacity:0;transform:translateY(8px);pointer-events:none}
.sess.flipped .ctrl-front{opacity:0;transform:translateY(-8px);pointer-events:none}
.sess.flipped .ctrl-back{opacity:1;transform:translateY(0);pointer-events:auto}

/* ===== completion ===== */
.done-card{text-align:center;padding:34px 20px}
.checkmark{width:76px;height:76px;margin:0 auto 8px;display:block}
.ck-c{stroke:var(--grn);stroke-width:3;stroke-dasharray:151;stroke-dashoffset:151;animation:ckStroke .5s var(--ease-io) forwards}
.ck-p{stroke:var(--grn);stroke-width:4;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:44;stroke-dashoffset:44;animation:ckStroke .3s .42s var(--ease-io) forwards}
.done-card h2{font-size:24px;font-weight:800;margin:10px 0 8px}
.done-stats{font-size:18px;color:var(--label2);margin-bottom:22px}
.done-stats b{color:var(--label)}

/* ===== list rows ===== */
.item{padding:13px 2px;border-bottom:.5px solid var(--sep);display:flex;gap:12px;align-items:center;cursor:pointer;transition:opacity .15s}
.item:last-child{border-bottom:none}
.item:active{opacity:.5}
.item .t{font-weight:600;font-size:16px}
.item .d{font-size:14px;color:var(--label2);display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;margin-top:1px}
.grp{font-size:13px;font-weight:600;color:var(--label2);margin:20px 6px 4px}

/* ===== preview rows ===== */
.prow{border-bottom:.5px solid var(--sep);padding:12px 0}
.prow:last-child{border:none}
.prow .top{display:flex;gap:10px;align-items:center;margin-bottom:6px}
.prow input[type=checkbox]{width:23px;height:23px;accent-color:var(--ac);flex-shrink:0}
.prow input[type=text]{font-weight:600}
.prow textarea{font-size:16px;margin-top:6px;min-height:58px}

/* ===== sheet modal ===== */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:40;display:flex;align-items:flex-end;animation:backdropIn .24s ease both}
.modal .panel{
 background:var(--bg);width:100%;max-height:90vh;overflow-y:auto;
 border-radius:20px 20px 0 0;padding:10px 16px calc(20px + env(safe-area-inset-bottom));
 -webkit-overflow-scrolling:touch;animation:sheetIn .4s var(--spring) both;
}
.panel::before{content:"";display:block;width:38px;height:5px;border-radius:3px;background:var(--label3);opacity:.5;margin:6px auto 12px}
.panel h3{font-size:20px;font-weight:700;margin:2px 0 12px}

/* ===== stats ===== */
.stat{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:.5px solid var(--sep);font-size:16px}
.stat:last-child{border:none}
.stat b{font-weight:600}

.spin{display:inline-block;width:16px;height:16px;border:2.5px solid rgba(255,255,255,.5);border-top-color:#fff;border-radius:50%;animation:sp .8s linear infinite;vertical-align:-3px;margin-right:7px}

/* ===== tab bar ===== */
.tabs{
 position:fixed;left:0;right:0;bottom:0;z-index:30;display:flex;
 background:var(--nav);-webkit-backdrop-filter:saturate(180%) blur(20px);backdrop-filter:saturate(180%) blur(20px);
 border-top:.5px solid var(--sep);padding-bottom:env(safe-area-inset-bottom);
}
.tabs button{
 flex:1;padding:8px 0 6px;background:none;border:none;cursor:pointer;font-family:inherit;
 display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--label2);
 transition:color .18s,transform .16s var(--spring);
}
.tabs button:active{transform:scale(.9)}
.tabs button.on{color:var(--ac)}
.tabs .ti{position:relative;display:flex;transition:transform .2s var(--spring)}
.tabs button.on .ti{transform:scale(1.04)}
.tabs .ti svg{width:26px;height:26px;display:block}
.tabs .tl{font-size:10px;font-weight:600;letter-spacing:0}
.tabs .cnt{position:absolute;top:-4px;right:-9px;background:var(--red);color:#fff;font-size:10px;font-weight:700;border-radius:999px;padding:1px 5px;min-width:17px;line-height:1.4;box-shadow:0 0 0 2px var(--nav)}

/* ===== toast ===== */
#toast{position:fixed;left:50%;bottom:calc(80px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(10px);background:var(--label);color:var(--card);padding:12px 18px;border-radius:13px;font-size:15px;font-weight:500;z-index:50;opacity:0;transition:opacity .24s var(--ease),transform .24s var(--ease);pointer-events:none;max-width:86%;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,.22)}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ===== keyframes ===== */
@keyframes screenIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes cardIn{from{opacity:0;transform:scale(.955)}to{opacity:1;transform:scale(1)}}
@keyframes popIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
@keyframes sheetIn{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes backdropIn{from{opacity:0}to{opacity:1}}
@keyframes ckStroke{to{stroke-dashoffset:0}}
@keyframes sp{to{transform:rotate(360deg)}}

button:focus-visible,input:focus-visible,textarea:focus-visible,.chip:focus-visible{outline:2.5px solid var(--ac);outline-offset:2px}

/* ===== switch / swatches / range / color ===== */
.switch{position:relative;display:inline-block;width:51px;height:31px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0;position:absolute}
.switch .sw{position:absolute;inset:0;background:var(--track);border-radius:999px;transition:background .26s var(--ease-io)}
.switch .sw::before{content:"";position:absolute;top:2px;left:2px;width:27px;height:27px;border-radius:50%;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.3);transition:transform .26s var(--spring)}
.switch input:checked + .sw{background:var(--grn)}
.switch input:checked + .sw::before{transform:translateX(20px)}
.swatches{display:flex;flex-wrap:wrap;gap:14px;padding:6px 2px 10px}
.swatch{width:34px;height:34px;border-radius:50%;border:none;cursor:pointer;position:relative;box-shadow:inset 0 0 0 1px rgba(0,0,0,.1);transition:transform .16s var(--spring)}
.swatch:active{transform:scale(.88)}
.swatch.on{box-shadow:0 0 0 2px var(--card),0 0 0 4.5px var(--label)}
input[type=color]{width:44px;height:30px;border:none;border-radius:9px;background:none;padding:0;cursor:pointer}
input[type=color]::-webkit-color-swatch-wrapper{padding:0}
input[type=color]::-webkit-color-swatch{border:1px solid var(--sep);border-radius:9px}
input[type=range]{-webkit-appearance:none;appearance:none;width:160px;height:5px;border-radius:3px;background:var(--track);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:27px;height:27px;border-radius:50%;background:#fff;box-shadow:0 1px 5px rgba(0,0,0,.3);cursor:pointer}
input[type=range]::-moz-range-thumb{width:27px;height:27px;border:none;border-radius:50%;background:#fff;box-shadow:0 1px 5px rgba(0,0,0,.3);cursor:pointer}

@media (prefers-reduced-motion: reduce){
 *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important}
 .flip-inner{transition:none}
 .btn:active,.chip:active,.tabs button:active{transform:none}
}
</style>
</head>
<body>
<header class="nav"><h1 class="nav-title" id="navtitle">生成</h1></header>
<main id="view"></main>
<nav class="tabs" id="tabs"></nav>
<div id="toast" role="status"></div>
<script>
'use strict';
/* CardForge v0.1 — 自分専用・共通テスト暗記カード
   設計原則:
   - 画像は「どの用語を学ぶか」の特定にのみ使用（解説はAIの知識から生成。Worker側で強制）
   - 画像はサーバーに保存されない（Worker参照）
   - 復習は原価ゼロ。生成のみが原価 → 生成枚数カウンタを常時記録（将来の課金軸）
   - 日付は全て端末ローカル基準（UTC混在バグの再発防止）
*/
const LS_KEY='card-forge:v1';
const DEFAULT_SUBJECTS=[
 {id:'info',name:'情報Ⅰ',color:'#2C4E80'},
 {id:'civics',name:'公共・政治経済',color:'#7A5A2E'},
 {id:'chem',name:'化学基礎',color:'#2E6B4E'}
];
const SUBJ_COLORS=['#2C4E80','#7A5A2E','#2E6B4E','#8A3B5C','#5B4A8A','#3E7A7A','#A0522D','#556B2F'];
const MAX_SUBJECTS=12;
const INTERVALS={1:1,2:2,3:4,4:8,5:16};
const DAILY_CAP=30, MAX_BATCH=5;

/* ---------- utils ---------- */
function $(q,el){return (el||document).querySelector(q);}
function $$(q,el){return Array.prototype.slice.call((el||document).querySelectorAll(q));}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m];});}
function uid(){return 'c'+Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function norm(s){return String(s||'').normalize('NFKC').trim().toLowerCase();}
function fmtDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function todayStr(){return fmtDate(new Date());}
function addDays(s,n){const d=new Date(s+'T00:00:00');d.setDate(d.getDate()+n);return fmtDate(d);}
let toastTimer=null;
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('on');clearTimeout(toastTimer);toastTimer=setTimeout(function(){t.classList.remove('on');},2800);}
async function copyText(txt){
 try{await navigator.clipboard.writeText(txt);toast('コピーしました');}
 catch(e){
  const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');toast('コピーしました');}catch(_){toast('コピーに失敗しました');}
  ta.remove();
 }
}

/* ---------- store ---------- */
function defaults(){return{version:4,settings:{workerUrl:'',token:''},cards:[],gen:{date:todayStr(),count:0,total:0},lastSubject:'info',lastBook:{},tipDismissed:false,subjects:DEFAULT_SUBJECTS.map(function(s){return {id:s.id,name:s.name,color:s.color,instruction:''};}),theme:{accent:'#3A56E8'},sound:{on:true,volume:0.5}};}
function load(){
 try{
  const r=localStorage.getItem(LS_KEY);
  if(!r)return defaults();
  const d=JSON.parse(r);
  const base=defaults();
  const out=Object.assign({},base,d,{
   settings:Object.assign({},base.settings,d.settings||{}),
   gen:Object.assign({},base.gen,d.gen||{}),
   lastBook:d.lastBook||{}
  });
  if(!Array.isArray(out.subjects))out.subjects=[];
  out.subjects=out.subjects.filter(function(x){return x&&x.id&&x.name;}).map(function(x){return {id:x.id,name:x.name,color:x.color||'#7B8093',instruction:typeof x.instruction==='string'?x.instruction:''};});
  if(out.subjects.length===0)out.subjects=base.subjects;
  if(!out.theme||typeof out.theme.accent!=='string'||!/^#[0-9a-fA-F]{6}$/.test(out.theme.accent))out.theme={accent:'#3A56E8'};
  if(!out.sound||typeof out.sound!=='object'||out.sound===null)out.sound={on:true,volume:0.5};
  out.sound.on=out.sound.on!==false;
  out.sound.volume=(typeof out.sound.volume==='number'&&out.sound.volume>=0&&out.sound.volume<=1)?out.sound.volume:0.5;
  out.version=4;
  return out;
 }catch(e){return defaults();}
}
let store=load();
function save(){try{localStorage.setItem(LS_KEY,JSON.stringify(store));}catch(e){toast('保存失敗：容量超過の可能性。バックアップを取ってください');}}
function rollGen(){const t=todayStr();if(store.gen.date!==t){store.gen.date=t;store.gen.count=0;save();}}
function dueCards(subj){const t=todayStr();return store.cards.filter(function(c){return c.nextReview<=t&&(!subj||c.subject===subj);});}
function subjects(){return store.subjects;}
function subjById(id){return store.subjects.find(function(x){return x.id===id;});}
function subjName(id){const x=subjById(id);return x?x.name:'不明な科目';}
function subjShort(id){const x=subjById(id);return x?x.name.trim().charAt(0):'?';}
function subjColor(id){const x=subjById(id);return (x&&x.color)?x.color:'#7B8093';}
function subjChip(id){return '<span class="subj" style="background:'+subjColor(id)+'">'+esc(subjShort(id))+'</span>';}

/* ---------- ui state ---------- */
let ui={tab:'gen',subject:store.lastSubject||'info',book:'',page:'',files:[],busy:false,preview:null,session:null,filter:'all',search:'',edit:null,sedit:null,connOpen:false};
if(!subjById(ui.subject))ui.subject=store.subjects[0].id;
ui.book=store.lastBook[ui.subject]||'';

/* ---------- render ---------- */
function setTab(t){ui.tab=t;ui.edit=null;ui.sedit=null;ui.connOpen=false;render();window.scrollTo(0,0);}
/* ---------- theme & sound ---------- */
const PRESETS=['#007AFF','#3A56E8','#AF52DE','#FF2D55','#FF3B30','#FF9500','#FFCC00','#34C759','#30B0C7','#8E8E93'];
function hexRgb(h){h=String(h||'').replace('#','');if(h.length===3)h=h.split('').map(function(c){return c+c;}).join('');const n=parseInt(h,16)||0;return {r:(n>>16)&255,g:(n>>8)&255,b:n&255};}
function hx(x){return Math.max(0,Math.min(255,Math.round(x))).toString(16).padStart(2,'0');}
function darkenHex(hex,f){const c=hexRgb(hex);return '#'+hx(c.r*(1-f))+hx(c.g*(1-f))+hx(c.b*(1-f));}
function lumin(hex){const c=hexRgb(hex);const a=[c.r,c.g,c.b].map(function(v){v/=255;return v<=0.03928?v/12.92:Math.pow((v+0.055)/1.055,2.4);});return 0.2126*a[0]+0.7152*a[1]+0.0722*a[2];}
function isDark(){try{return matchMedia('(prefers-color-scheme: dark)').matches;}catch(e){return false;}}
function applyTheme(){
 const ac=(store.theme&&store.theme.accent)||'#3A56E8';
 const c=hexRgb(ac),d=isDark();
 const r=document.documentElement.style;
 r.setProperty('--ac',ac);
 r.setProperty('--ac-press',darkenHex(ac,0.14));
 r.setProperty('--ac-soft','rgba('+c.r+','+c.g+','+c.b+','+(d?0.24:0.14)+')');
 r.setProperty('--on-ac',lumin(ac)>0.6?'#000000':'#FFFFFF');
}
let _ac=null;
// 受験サポーター共通サウンド（受験進捗トラッカー基準）
// type: tap / select(選択・タブ・チップ) / toggle / back / success(正解・完了) / error(不正解・危険)
function playSound(type){
 const s=store.sound;if(!s||!s.on)return;
 const vol=Math.max(0,Math.min(1,(typeof s.volume==='number'?s.volume:0.5)));if(vol<=0)return;
 try{if(!_ac)_ac=new (window.AudioContext||window.webkitAudioContext)();}catch(e){_ac=null;}
 if(!_ac)return;
 if(_ac.state==='suspended'){try{_ac.resume();}catch(e){}}
 const now=_ac.currentTime;
 const notes={
  tap:[[880,0.05]],
  select:[[660,0.06]],
  toggle:[[740,0.05]],
  back:[[520,0.07]],
  success:[[784,0.09],[1175,0.14]],
  error:[[300,0.12],[220,0.16]]
 }[type]||[[880,0.05]];
 const master=_ac.createGain();
 master.gain.value=vol*0.32;
 master.connect(_ac.destination);
 notes.forEach(function(n,i){
  const freq=n[0],dur=n[1],t0=now+i*0.06;
  const o=_ac.createOscillator(),g=_ac.createGain();
  o.type='sine';o.frequency.value=freq;
  g.gain.setValueAtTime(0.0001,t0);
  g.gain.exponentialRampToValueAtTime(1,t0+0.008);
  g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
  o.connect(g);g.connect(master);
  o.start(t0);o.stop(t0+dur+0.02);
 });
}

function resizeImage(file,maxEdge,quality){
 return new Promise(function(resolve,reject){
  const url=URL.createObjectURL(file);
  const img=new Image();
  img.onload=function(){
   try{
    const scale=Math.min(1,maxEdge/Math.max(img.width,img.height));
    const w=Math.max(1,Math.round(img.width*scale));
    const h=Math.max(1,Math.round(img.height*scale));
    const cv=document.createElement('canvas');cv.width=w;cv.height=h;
    cv.getContext('2d').drawImage(img,0,0,w,h);
    URL.revokeObjectURL(url);
    resolve(cv.toDataURL('image/jpeg',quality));
   }catch(err){URL.revokeObjectURL(url);reject(err);}
  };
  img.onerror=function(){URL.revokeObjectURL(url);reject(new Error('画像を読み込めませんでした'));};
  img.src=url;
 });
}
async function generate(){
 if(ui.busy)return;
 const s=store.settings;
 if(!s.workerUrl){toast('設定タブでWorker URLを保存してください');return;}
 if(ui.files.length===0){toast('画像を選択してください');return;}
 rollGen();
 if(store.gen.count+ui.files.length>DAILY_CAP){toast('本日の残り枚数（'+(DAILY_CAP-store.gen.count)+'枚）を超えています');return;}
 ui.busy=true;render();
 try{
  const images=[];
  for(const f of ui.files)images.push(await resizeImage(f.file,1536,0.72));
  const ctrl=new AbortController();
  const tm=setTimeout(function(){ctrl.abort();},120000);
  const res=await fetch(s.workerUrl,{
   method:'POST',
   headers:{'Content-Type':'application/json','X-Access-Token':s.token||''},
   body:JSON.stringify({subject:ui.subject,subjectName:subjName(ui.subject),subjectPrompt:((subjById(ui.subject)||{}).instruction||''),images:images}),
   signal:ctrl.signal
  });
  clearTimeout(tm);
  let data={};
  try{data=await res.json();}catch(_){}
  if(!res.ok)throw new Error(data.error||('サーバーエラー HTTP '+res.status));
  const raw=Array.isArray(data.cards)?data.cards:[];
  const cards=raw.map(function(c){return{term:String((c&&c.term)||'').trim(),definition:String((c&&c.definition)||'').trim(),tag:String((c&&c.tag)||'').trim()};}).filter(function(c){return c.term&&c.definition;});
  if(cards.length===0)throw new Error('用語を抽出できませんでした。画像の向き・鮮明さを確認してください');
  store.gen.count+=ui.files.length;store.gen.total+=ui.files.length;
  store.lastSubject=ui.subject;store.lastBook[ui.subject]=ui.book.trim();save();
  const seen=new Set();
  const existing=new Set(store.cards.filter(function(c){return c.subject===ui.subject;}).map(function(c){return norm(c.term);}));
  const items=[];
  for(const c of cards){
   const k=norm(c.term);
   if(seen.has(k))continue;
   seen.add(k);
   const dup=existing.has(k);
   items.push({term:c.term,definition:c.definition,tag:c.tag,dup:dup,sel:!dup});
  }
  ui.files.forEach(function(f){URL.revokeObjectURL(f.url);});
  ui.files=[];
  ui.preview={subject:ui.subject,book:ui.book.trim(),page:ui.page.trim(),items:items};
 }catch(err){
  toast(err.name==='AbortError'?'タイムアウトしました。枚数を減らして再試行してください':('エラー：'+err.message));
 }
 ui.busy=false;render();
}

  store.cards.push({id:uid(),subject:p.subject,term:term,definition:def,tag:it.tag||'',source:{book:p.book,page:p.page},box:1,nextReview:t,createdAt:new Date().toISOString(),history:{ok:0,ng:0}});

function grade(ok){
 const s=ui.session;
 const c=s.queue[s.i];
 const t=todayStr();
 if(!(c.id in s.graded)){
  s.graded[c.id]=ok;
  if(ok){
   s.ok++;
   c.box=Math.min(5,c.box+1);
   c.nextReview=addDays(t,INTERVALS[c.box]);
   c.history.ok++;
  }else{
   s.ng++;
   c.box=1;
   c.nextReview=addDays(t,1);
   c.history.ng++;
  }
  save();
 }
 if(!ok)s.queue.push(c); /* セッション内で再出題（採点は初回のみ反映） */
 s.i++;s.flipped=false;render();
}

function cardList(){
 let list=store.cards.filter(function(c){return ui.filter==='all'||c.subject===ui.filter;});
 const q=norm(ui.search);
 if(q)list=list.filter(function(c){return norm(c.term).indexOf(q)>=0||norm(c.definition).indexOf(q)>=0;});
 if(list.length===0)return '<div class="card muted" style="margin-top:12px">カードがありません</div>';
 const groups={};
 for(const c of list){
  const k=(c.source&&c.source.book)||'（出典なし）';
  (groups[k]=groups[k]||[]).push(c);
 }
 return Object.keys(groups).sort().map(function(book){
  const items=groups[book].sort(function(a,b){
   const pa=norm((a.source&&a.source.page)||''),pb=norm((b.source&&b.source.page)||'');
   if(pa!==pb)return pa.localeCompare(pb,'ja');
   return norm(a.term).localeCompare(norm(b.term),'ja');
  });
  const rows=items.map(function(c){
   const chip=ui.filter==='all'?subjChip(c.subject)+' ':'';
   const pg=(c.source&&c.source.page)?'<div class="muted" style="font-size:11px">'+esc(c.source.page)+'</div>':'';
   return '<div class="item" data-edit="'+c.id+'">'
   +'<div style="flex:1;min-width:0"><div class="t">'+esc(c.term)+'</div><div class="d">'+esc(c.definition)+'</div></div>'
   +'<div style="text-align:right;flex-shrink:0">'+chip+'<span class="badge">箱'+c.box+'</span>'+pg+'</div>'
   +'</div>';
  }).join('');
  return '<div class="grp">'+esc(book)+'（'+items.length+'）</div><div class="card" style="padding:4px 14px">'+rows+'</div>';
 }).join('');
}

 +'<label class="f">科目名</label><input type="text" id="sj-name" value="'+esc(isNew?'':sj.name)+'" placeholder="例：日本史">'
 +'<label class="f">AIへの指示（任意・精度向上）</label>'
 +'<textarea id="sj-inst" placeholder="例：年号・人物・出来事の因果を重視。人名は活躍した時代と業績を1文で。計算問題はカード化しない。">'+esc(isNew?'':(sj.instruction||''))+'</textarea>'
 +(isNew?'<div class="muted" style="margin:8px 0">この指示と科目名がAIへの指示に使われます。追加科目は指示を書くほど精度が上がります。</div>':'<div class="muted" style="margin:8px 0">カード '+cnt+'枚。この指示と科目名がAIへの指示に使われます。</div>')
 +'<div class="row" style="margin-top:6px"><button class="btn" id="sj-cancel">閉じる</button><button class="btn primary" id="sj-save">保存する</button></div>'
 +delBtn
 +'</div></div>';
}
function modalHTML(){
 if(ui.sedit)return subjModalHTML();
 if(!ui.edit)return '';
 const c=store.cards.find(function(x){return x.id===ui.edit;});
 if(!c)return '';
 return '<div class="modal" id="modal"><div class="panel">'
 +'<h3 style="margin:2px 0 10px">カード編集</h3>'
 +'<label class="f">用語</label><input type="text" id="e-term" value="'+esc(c.term)+'">'
 +'<label class="f">解説</label><textarea id="e-def" style="min-height:110px">'+esc(c.definition)+'</textarea>'
 +'<div class="row"><div style="flex:1"><label class="f">参考書</label><input type="text" id="e-book" value="'+esc((c.source&&c.source.book)||'')+'"></div>'
 +'<div style="flex:1"><label class="f">ページ</label><input type="text" id="e-page" value="'+esc((c.source&&c.source.page)||'')+'"></div></div>'
 +'<div class="muted" style="margin:10px 0">箱'+c.box+' ・ ○'+c.history.ok+' ✕'+c.history.ng+' ・ 次回 '+esc(c.nextReview)+'</div>'
 +'<div class="row"><button class="btn" id="e-cancel">閉じる</button><button class="btn primary" id="e-save">保存する</button></div>'
 +'<div style="height:10px"></div>'
 +'<button class="btn small danger" id="e-del" style="border-color:var(--red)">このカードを削除</button>'
 +'</div></div>';
}

/* ---------- 設定タブ ---------- */
function viewSet(){
 const s=store.settings;
 const kb=Math.round(((localStorage.getItem(LS_KEY)||'').length/1024)*10)/10;
 const conn=ui.connOpen
  ?('<label class="f">Cloudflare Worker URL</label>'
   +'<input type="url" id="s-url" value="'+esc(s.workerUrl)+'" placeholder="https://xxxx.workers.dev" autocapitalize="off" autocorrect="off">'
   +'<label class="f">合言葉（WorkerのACCESS_TOKENと同じ文字列）</label>'
   +'<input type="text" id="s-token" value="'+esc(s.token)+'" autocapitalize="off" autocorrect="off">'
   +'<div style="height:12px"></div>'
   +'<div class="row"><button class="btn" id="conn-close">キャンセル</button><button class="btn primary" id="s-save">保存する</button></div>')
  :('<div class="stat"><span>Worker URL</span><b>'+(s.workerUrl?'設定済み':'<span class="danger">未設定</span>')+'</b></div>'
   +'<div class="stat"><span>合言葉</span><b>'+(s.token?'設定済み':'<span class="danger">未設定</span>')+'</b></div>'
   +'<div style="height:10px"></div>'
   +'<button class="btn" id="conn-open">接続設定を開く</button>');
 const subjRows=subjects().map(function(sj){
  const cnt=store.cards.filter(function(c){return c.subject===sj.id;}).length;
  return '<div class="stat"><span>'+subjChip(sj.id)+' '+esc(sj.name)+'<span class="muted">（'+cnt+'枚）</span></span><button class="btn small" data-sedit="'+sj.id+'">変更</button></div>';
 }).join('');
 return '<div class="section-title">接続設定</div>'
 +'<div class="card">'+conn+'</div>'
 +'<div class="section-title">科目の管理</div>'
 +'<div class="card">'+subjRows
 +'<div style="height:10px"></div>'
 +'<button class="btn" id="sj-add">＋ 科目を追加</button>'
 +'</div>'
 +'<div class="section-title">テーマカラー</div>'
 +'<div class="card">'
 +'<div class="swatches">'+PRESETS.map(function(hex){return '<button class="swatch'+(norm((store.theme&&store.theme.accent)||'')===norm(hex)?' on':'')+'" data-swatch="'+hex+'" style="background:'+hex+'" aria-label="テーマ色"></button>';}).join('')+'</div>'
 +'<div class="stat"><span>カスタム</span><input type="color" id="th-custom" value="'+esc((store.theme&&store.theme.accent)||'#3A56E8')+'"></div>'
 +'</div>'
 +'<div class="section-title">サウンド</div>'
 +'<div class="card">'
 +'<div class="stat"><span>ボタン効果音</span>'+switchHTML('snd-on',!!(store.sound&&store.sound.on))+'</div>'
 +'<div class="stat"><span>音量</span><input type="range" id="snd-vol" min="0" max="100" value="'+Math.round(((store.sound&&store.sound.volume)||0)*100)+'"></div>'
 +'</div>'
 +'<div class="section-title">統計</div>'
 +'<div class="card">'
 +'<div class="stat"><span>カード総数</span><b>'+store.cards.length+'枚</b></div>'
 +'<div class="stat"><span>本日の生成</span><b>'+store.gen.count+' / '+DAILY_CAP+'枚</b></div>'
 +'<div class="stat"><span>累計生成（課金設計用）</span><b>'+store.gen.total+'枚</b></div>'
 +'<div class="stat"><span>データ容量</span><b>'+kb+' KB</b></div>'
 +'</div>'
 +'<div class="section-title">バックアップ</div>'
 +'<div class="card">'
 +'<div class="muted" style="margin-bottom:10px">localStorageは消えることがあります。週1回のバックアップを推奨。</div>'
 +'<div class="row"><button class="btn" id="b-copy">全データをコピー</button><button class="btn" id="b-tsv">TSVコピー</button></div>'
 +'<label class="f">復元（バックアップJSONを貼り付け）</label>'
 +'<textarea id="b-in" placeholder=\'{"version":1,...}\'></textarea>'
 +'<div class="row" style="margin-top:10px"><button class="btn" id="b-merge">統合する</button><button class="btn" id="b-replace">置き換える</button></div>'
 +'</div>'
 +'<div class="card"><button class="btn small danger" id="b-wipe" style="border-color:var(--red)">全データを削除</button></div>'
 +'<div class="muted" style="text-align:center">CardForge v0.5 ・ 画像は保存されず処理後に破棄されます</div>';
}
function restore(replace){
 const txt=$('#b-in').value.trim();
 if(!txt){toast('バックアップJSONを貼り付けてください');return;}
 let d;
 try{d=JSON.parse(txt);}catch(e){toast('JSONを解析できません');return;}
 if(!d||!Array.isArray(d.cards)){toast('形式が不正です');return;}
 if(replace){
  if(!confirm('現在の全データを置き換えます。よろしいですか？'))return;
  store=Object.assign(defaults(),d);
  if(!Array.isArray(store.subjects))store.subjects=[];
  store.subjects=store.subjects.filter(function(x){return x&&x.id&&x.name;}).map(function(x){return {id:x.id,name:x.name,color:x.color||'#7B8093',instruction:typeof x.instruction==='string'?x.instruction:''};});
  if(store.subjects.length===0)store.subjects=defaults().subjects;
  if(!store.theme||typeof store.theme.accent!=='string'||!/^#[0-9a-fA-F]{6}$/.test(store.theme.accent))store.theme={accent:'#3A56E8'};
  if(!store.sound||typeof store.sound!=='object'||store.sound===null)store.sound={on:true,volume:0.5};
  store.sound.on=store.sound.on!==false;
  store.sound.volume=(typeof store.sound.volume==='number'&&store.sound.volume>=0&&store.sound.volume<=1)?store.sound.volume:0.5;
  store.version=4;
  save();toast('置き換えました');
 }else{
  const ids=new Set(store.cards.map(function(c){return c.id;}));
  let n=0;
  for(const c of d.cards){
   if(!c||!c.id||ids.has(c.id))continue;
   store.cards.push(c);n++;
  }
  save();toast(n+'枚を統合しました');
 }
 if(!subjById(ui.subject)){ui.subject=store.subjects[0].id;ui.book=store.lastBook[ui.subject]||'';}
 if(ui.filter!=='all'&&!subjById(ui.filter))ui.filter='all';
 render();
}

/* ---------- bind ---------- */
function bindList(){
 $$('[data-edit]').forEach(function(it){it.onclick=function(){ui.edit=it.dataset.edit;render();};});
}
function bind(){
 const tipx=$('#tip-x');if(tipx)tipx.onclick=function(){store.tipDismissed=true;save();render();};
 const goset=$('#go-set');if(goset)goset.onclick=function(){setTab('set');};
 if(ui.tab==='gen'&&!ui.preview){
  $$('.chip[data-subj]').forEach(function(ch){ch.onclick=function(){ui.subject=ch.dataset.subj;ui.book=store.lastBook[ui.subject]||'';ui.page='';render();};});
  const gb=$('#g-book');if(gb)gb.oninput=function(e){ui.book=e.target.value;};
  const gp=$('#g-page');if(gp)gp.oninput=function(e){ui.page=e.target.value;};
  const fi=$('#g-file');
  const pick=$('#g-pick');if(pick)pick.onclick=function(){fi.click();};
  if(fi)fi.onchange=onFiles;
  $$('[data-rm]').forEach(function(b){b.onclick=function(){const i=Number(b.dataset.rm);URL.revokeObjectURL(ui.files[i].url);ui.files.splice(i,1);render();};});
  const run=$('#g-run');if(run)run.onclick=generate;
 }
 if(ui.tab==='gen'&&ui.preview){
  $$('[data-sel]').forEach(function(cb){cb.onchange=function(){ui.preview.items[Number(cb.dataset.sel)].sel=cb.checked;$('#p-count').textContent=ui.preview.items.filter(function(i){return i.sel;}).length;};});
  $$('[data-term]').forEach(function(inp){inp.oninput=function(){ui.preview.items[Number(inp.dataset.term)].term=inp.value;};});
  $$('[data-def]').forEach(function(ta){ta.oninput=function(){ui.preview.items[Number(ta.dataset.def)].definition=ta.value;};});
  $('#p-discard').onclick=function(){if(confirm('抽出結果を破棄しますか？')){ui.preview=null;render();}};
  $('#p-save').onclick=savePreview;
 }
 if(ui.tab==='rev'){
  if(ui.session){
   const done=$('#s-done');if(done)done.onclick=function(){ui.session=null;render();};
   const sess=$('#sess');
   const card=$('#s-card');
   function doFlip(v){ui.session.flipped=(v===undefined)?!ui.session.flipped:v;if(sess)sess.classList.toggle('flipped',ui.session.flipped);}
   if(card)card.onclick=function(){doFlip();};
   const fl=$('#s-flip');if(fl)fl.onclick=function(e){e.stopPropagation();doFlip(true);};
   const ok=$('#s-ok');if(ok)ok.onclick=function(e){e.stopPropagation();grade(true);};
   const ng=$('#s-ng');if(ng)ng.onclick=function(e){e.stopPropagation();grade(false);};
   const quit=$('#s-quit');if(quit)quit.onclick=function(){ui.session=null;render();};
  }else{
   $$('[data-start]').forEach(function(b){b.onclick=function(){startSession(b.dataset.start);};});
   const sa=$('#start-all');if(sa)sa.onclick=function(){startSession(null);};
  }
 }
 if(ui.tab==='cards'){
  $$('.chip[data-filter]').forEach(function(ch){ch.onclick=function(){ui.filter=ch.dataset.filter;render();};});
  const se=$('#c-search');
  if(se)se.oninput=function(e){ui.search=e.target.value;$('#c-list').innerHTML=cardList();bindList();};
  $('#c-list').innerHTML=cardList();
  bindList();
 }
 if(ui.tab==='set'){
  const co=$('#conn-open');if(co)co.onclick=function(){ui.connOpen=true;render();};
  const cc=$('#conn-close');if(cc)cc.onclick=function(){ui.connOpen=false;render();};
  const ss=$('#s-save');
  if(ss)ss.onclick=function(){
   store.settings.workerUrl=$('#s-url').value.trim().replace(/\/+$/,'');
   store.settings.token=$('#s-token').value.trim();
   save();ui.connOpen=false;toast('保存しました');render();
  };
  const sja=$('#sj-add');
  if(sja)sja.onclick=function(){
   if(store.subjects.length>=MAX_SUBJECTS){toast('科目は最大'+MAX_SUBJECTS+'個までです');return;}
   ui.sedit='_new';render();
  };
  $$('[data-sedit]').forEach(function(b){b.onclick=function(){ui.sedit=b.dataset.sedit;render();};});
  $$('[data-swatch]').forEach(function(b){b.onclick=function(){store.theme.accent=b.dataset.swatch;save();applyTheme();render();};});
  const thc=$('#th-custom');if(thc){thc.oninput=function(e){store.theme.accent=e.target.value;applyTheme();};thc.onchange=function(e){store.theme.accent=e.target.value;save();render();};}
  const so=$('#snd-on');if(so)so.onchange=function(e){store.sound.on=e.target.checked;save();if(e.target.checked)playClick();};
  const sv=$('#snd-vol');if(sv){setRangeFill(sv);sv.oninput=function(e){store.sound.volume=(+e.target.value)/100;setRangeFill(sv);};sv.onchange=function(e){store.sound.volume=(+e.target.value)/100;save();playClick();};}
  $('#b-copy').onclick=function(){copyText(JSON.stringify(store));};
  $('#b-tsv').onclick=function(){
   const rows=store.cards.map(function(c){
    return [c.term,c.definition,subjName(c.subject),(c.source&&c.source.book)||'',(c.source&&c.source.page)||'']
     .map(function(x){return String(x).replace(/[\t\n\r]/g,' ');}).join('\t');
   });
   copyText(rows.join('\n'));
  };
  $('#b-merge').onclick=function(){restore(false);};
  $('#b-replace').onclick=function(){restore(true);};
  $('#b-wipe').onclick=function(){
   if(confirm('全データを削除します。よろしいですか？')&&confirm('本当に削除しますか？この操作は戻せません。')){
    localStorage.removeItem(LS_KEY);
    store=load();
    ui.preview=null;ui.session=null;ui.sedit=null;ui.connOpen=false;
    ui.subject=store.subjects[0].id;ui.book=store.lastBook[ui.subject]||'';ui.filter='all';
    toast('削除しました');render();
   }
  };
 }
 if(ui.sedit){
  $('#sj-cancel').onclick=function(){ui.sedit=null;render();};
  $('#sj-save').onclick=function(){
   const name=$('#sj-name').value.trim();
   if(!name){toast('科目名を入力してください');return;}
   if(name.length>20){toast('科目名は20文字以内にしてください');return;}
   const dupe=store.subjects.some(function(x){return norm(x.name)===norm(name)&&x.id!==ui.sedit;});
   if(dupe){toast('同じ名前の科目があります');return;}
   let inst=($('#sj-inst')?$('#sj-inst').value:'').trim();
   if(inst.length>400)inst=inst.slice(0,400);
   if(ui.sedit==='_new'){
    const id='s'+Date.now().toString(36)+Math.random().toString(36).slice(2,4);
    const color=SUBJ_COLORS[store.subjects.length%SUBJ_COLORS.length];
    store.subjects.push({id:id,name:name,color:color,instruction:inst});
   }else{
    const sj=subjById(ui.sedit);
    if(sj){sj.name=name;sj.instruction=inst;}
   }
   save();ui.sedit=null;toast('保存しました');render();
  };
  const sjd=$('#sj-del');
  if(sjd)sjd.onclick=function(){
   const cnt=store.cards.filter(function(c){return c.subject===ui.sedit;}).length;
   if(cnt>0){toast('カードが'+cnt+'枚ある科目は削除できません。先にカードを削除してください');return;}
   if(store.subjects.length<=1){toast('最低1科目は必要です');return;}
   if(!confirm('この科目を削除しますか？'))return;
   store.subjects=store.subjects.filter(function(x){return x.id!==ui.sedit;});
   if(!subjById(ui.subject)){ui.subject=store.subjects[0].id;ui.book=store.lastBook[ui.subject]||'';}
   if(ui.filter!=='all'&&!subjById(ui.filter))ui.filter='all';
   save();ui.sedit=null;toast('削除しました');render();
  };
  const sm=$('#modal');if(sm)sm.onclick=function(e){if(e.target.id==='modal'){ui.sedit=null;render();}};
 }
 if(ui.edit&&!ui.sedit){
  $('#e-cancel').onclick=function(){ui.edit=null;render();};
  $('#e-save').onclick=function(){
   const c=store.cards.find(function(x){return x.id===ui.edit;});
   if(!c)return;
   c.term=$('#e-term').value.trim();
   c.definition=$('#e-def').value.trim();
   c.source={book:$('#e-book').value.trim(),page:$('#e-page').value.trim()};
   save();ui.edit=null;toast('保存しました');render();
  };
  $('#e-del').onclick=function(){
   if(confirm('このカードを削除しますか？')){
    store.cards=store.cards.filter(function(x){return x.id!==ui.edit;});
    save();ui.edit=null;toast('削除しました');render();
   }
  };
  $('#modal').onclick=function(e){if(e.target.id==='modal'){ui.edit=null;render();}};
 }
}
applyTheme();
attachSound();
try{matchMedia('(prefers-color-scheme: dark)').addEventListener('change',applyTheme);}catch(e){}
render();
</script>
